<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bloxd.io BedWars 3D Clone</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="resource-hud">
        <div class="res-count">⬜ FERRO: <span id="hud-iron">0</span></div>
        <div class="res-count" style="color:#ffd700">🟨 OURO: <span id="hud-gold">0</span></div>
    </div>

    <div id="crosshair">+</div>

    <div id="alert-box"></div>

    <div id="mobile-controls">
        <div id="joystick-move"></div>
        <div id="joystick-look"></div>
        <button id="btn-jump" class="action-btn">PULAR</button>
        <button id="btn-action" class="action-btn">AÇÃO / BLOCO</button>
        <button id="btn-attack" class="action-btn">ATACAR</button>
    </div>

    <button id="shop-trigger" onclick="toggleShop(true)">LOJA [B]</button>

    <div id="hotbar">
        <div class="slot active" onclick="setSlot(0)">⚔️<br><span>Espada</span></div>
        <div class="slot" onclick="setSlot(1)">⛏️<br><span>Picareta</span></div>
        <div class="slot" onclick="setSlot(2)" id="slot-blocks">📦0<br><span>Blocos</span></div>
    </div>

    <div id="shop-modal">
        <div id="shop-sidebar">
            <button class="tab-btn active" onclick="switchTab('blocks')">Blocks</button>
            <button class="tab-btn" onclick="switchTab('combat')">Combat</button>
            <button class="tab-btn" onclick="switchTab('utility')">Utility</button>
            <button class="tab-btn btn-exit" onclick="toggleShop(false)">Sair</button>
        </div>
        <div id="shop-content">
            <h2 id="shop-title">Blocks Shop</h2>
            <div class="shop-grid" id="shop-items-container"></div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vortex Galaxy Strike - Premium Physics</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
            touch-action: none; /* Bloqueia zoom e rolagem nativa do Android/WebView */
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #020205;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        /* HUD Superior */
        #hud {
            position: absolute;
            top: 15px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            pointer-events: none;
            font-family: monospace;
        }
        .hud-item {
            background: rgba(5, 5, 15, 0.85);
            border: 1px solid #00ffcc;
            box-shadow: 0 0 12px rgba(0, 255, 204, 0.3);
            padding: 8px 16px;
            border-radius: 4px;
            color: #fff;
            font-size: 14px;
            font-weight: bold;
        }
        .hud-item span { color: #ff0055; }

        /* Modais */
        .modal {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 2, 5, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 10;
            display: none;
        }
        .modal.active { display: flex; }
        .modal h1 {
            font-size: 32px;
            color: #00ffcc;
            text-shadow: 0 0 15px rgba(0, 255, 204, 0.6);
            margin-bottom: 20px;
            letter-spacing: 2px;
        }
        .btn {
            background: linear-gradient(90deg, #00ffcc, #7a00ff);
            border: none;
            padding: 14px 35px;
            color: black;
            font-weight: bold;
            border-radius: 4px;
            font-size: 16px;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
        }
    </style>
</head>
<body>

    <div id="hud">
        <div class="hud-item">ESCUDO: <span id="shield-txt">100</span>%</div>
        <div class="hud-item">KILLS: <span id="kills-txt">0</span></div>
        <div class="hud-item">VEL: <span id="vel-txt" style="color:#00ffcc">0</span> km/h</div>
    </div>

    <canvas id="spaceCanvas"></canvas>

    <div id="gameover-modal" class="modal">
        <h1>NAVE DESTRUÍDA</h1>
        <p style="margin-bottom: 30px; color: #888;">Seu esquadrão abateu <span id="final-kills" style="color:#ff0055">0</span> naves inimigas.</p>
        <button class="btn" onclick="restartGame()">REINICIAR SISTEMAS</button>
    </div>

    <script>
        const canvas = document.getElementById('spaceCanvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Estados Globais
        let running = true;
        let kills = 0;
        let lastSpawn = 0;
        const stars = [];

        // Gerar Fundo Estelar (Efeito Parallax)
        for(let i=0; i<60; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2,
                speed: Math.random() * 0.5 + 0.1
            });
        }

        // FÍSICA APLICADA: Jogador Espacial (Estilo Asteroids Premium)
        const player = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            vx: 0, // Velocidade Vetorial X
            vy: 0, // Velocidade Vetorial Y
            acceleration: 0.18,
            friction: 0.98, // Atrito do vácuo reduzido para dar sensação de espaço
            maxSpeed: 6,
            angle: 0,
            radius: 16,
            shield: 100,
            lastShot: 0,
            fireRate: 200 // Milissegundos
        };

        // Listas do Sistema
        const enemies = [];
        const lasers = [];
        const particles = [];

        // ESTRUTURA DOS ANALÓGICOS VIRTUAIS (Fix de Toque para WebView do Sketchware)
        // Definindo áreas fixas invisíveis para evitar travamento do DOM externo
        const joyMove = { x: 80, y: 0, radOuter: 50, radInner: 22, touchId: null, currX: 80, currY: 0, active: false, outX: 0, outY: 0 };
        const joyAim = { x: 0, y: 0, radOuter: 50, radInner: 22, touchId: null, currX: 0, currY: 0, active: false, outX: 0, outY: 0 };

        function updateJoystickPositions() {
            joyMove.y = canvas.height - 90;
            joyAim.x = canvas.width - 80;
            joyAim.y = canvas.height - 90;
            joyMove.currX = joyMove.x; joyMove.currY = joyMove.y;
            joyAim.currX = joyAim.x; joyAim.currY = joyAim.y;
        }
        updateJoystickPositions();
        window.addEventListener('resize', updateJoystickPositions);

        // Captura Robusta de Toques Multi-Touch sem vinculo com elementos HTML
        window.addEventListener('touchstart', (e) => {
            for(let touch of e.changedTouches) {
                // Lado Esquerdo - Movimento
                if(touch.clientX < canvas.width / 2 && joyMove.touchId === null) {
                    joyMove.touchId = touch.identifier;
                    joyMove.active = true;
                    handleJoyMove(joyMove, touch.clientX, touch.clientY);
                }
                // Lado Direito - Mira e Tiro
                if(touch.clientX >= canvas.width / 2 && joyAim.touchId === null) {
                    joyAim.touchId = touch.identifier;
                    joyAim.active = true;
                    handleJoyMove(joyAim, touch.clientX, touch.clientY);
                }
            }
        }, { passive: false });

        window.addEventListener('touchmove', (e) => {
            e.preventDefault(); // Mata qualquer tentativa de scroll ou travamento do Android
            for(let touch of e.touches) {
                if(touch.identifier === joyMove.touchId) {
                    handleJoyMove(joyMove, touch.clientX, touch.clientY);
                }
                if(touch.identifier === joyAim.touchId) {
                    handleJoyMove(joyAim, touch.clientX, touch.clientY);
                }
            }
        }, { passive: false });

        const endTouchHandler = (e) => {
            for(let touch of e.changedTouches) {
                if(touch.identifier === joyMove.touchId) {
                    joyMove.touchId = null; joyMove.active = false;
                    joyMove.currX = joyMove.x; joyMove.currY = joyMove.y;
                    joyMove.outX = 0; joyMove.outY = 0;
                }
                if(touch.identifier === joyAim.touchId) {
                    joyAim.touchId = null; joyAim.active = false;
                    joyAim.currX = joyAim.x; joyAim.currY = joyAim.y;
                    joyAim.outX = 0; joyAim.outY = 0;
                }
            }
        };
        window.addEventListener('touchend', endTouchHandler);
        window.addEventListener('touchcancel', endTouchHandler);

        function handleJoyMove(joy, clientX, clientY) {
            let dx = clientX - joy.x;
            let dy = clientY - joy.y;
            let dist = Math.hypot(dx, dy);

            if(dist > joy.radOuter) {
                dx = (dx / dist) * joy.radOuter;
                dy = (dy / dist) * joy.radOuter;
                dist = joy.radOuter;
            }
            joy.currX = joy.x + dx;
            joy.currY = joy.y + dy;
            joy.outX = dx / joy.radOuter;
            joy.outY = dy / joy.radOuter;
        }

        // Invocação de Explosões de Partículas Físicas
        function explode(x, y, color, amount=12) {
            for(let i=0; i<amount; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 5,
                    vy: (Math.random() - 0.5) * 5,
                    radius: Math.random() * 3 + 1,
                    color: color,
                    life: 1.0,
                    decay: Math.random() * 0.04 + 0.02
                });
            }
        }

        // Sistema de Disparo Coerente
        function fireLaser(shooter, angle, isEnemy=false) {
            lasers.push({
                x: shooter.x + Math.cos(angle) * shooter.radius,
                y: shooter.y + Math.sin(angle) * shooter.radius,
                vx: Math.cos(angle) * (isEnemy ? 5 : 9),
                vy: Math.sin(angle) * (isEnemy ? 5 : 9),
                radius: isEnemy ? 3 : 4,
                color: isEnemy ? '#ff3366' : '#00ffcc',
                isEnemy: isEnemy
            });
        }

        // Inimigos Inteligentes (IA Perseguguidora de Quadrante)
        function spawnEnemy() {
            if(enemies.length >= 8 || !running) return;
            let x = Math.random() < 0.5 ? -40 : canvas.width + 40;
            let y = Math.random() * canvas.height;
            
            enemies.push({
                x: x, y: y,
                vx: 0, vy: 0,
                radius: 14,
                speed: 1.5,
                color: '#ff3366',
                lastShot: 0,
                fireInterval: 1800 + Math.random() * 1000
            });
        }

        // LOOP PRINCIPAL DE LÓGICA E FÍSICA (Update Engine)
        function update() {
            if(!running) return;

            // 1. Aplicar Física de Inércia na Nave do Jogador
            if(joyMove.active) {
                player.vx += joyMove.outX * player.acceleration;
                player.vy += joyMove.outY * player.acceleration;
                
                // Limitar velocidade máxima vetorial
                let currentSpeed = Math.hypot(player.vx, player.vy);
                if(currentSpeed > player.maxSpeed) {
                    player.vx = (player.vx / currentSpeed) * player.maxSpeed;
                    player.vy = (player.vy / currentSpeed) * player.maxSpeed;
                }
                
                // Rotacionar para direção do movimento caso não esteja mirando
                if(!joyAim.active) {
                    player.angle = Math.atan2(joyMove.outY, joyMove.outX);
                }
            }

            // Aplicar atrito natural do espaço (desaceleração suave)
            player.vx *= player.friction;
            player.vy *= player.friction;
            player.x += player.vx;
            player.y += player.vy;

            // Bloqueio de bordas físicas do cenário
            player.x = Math.max(player.radius, Math.min(canvas.width - player.radius, player.x));
            player.y = Math.max(player.radius, Math.min(canvas.height - player.radius, player.y));

            // Atualizar HUD de velocidade em tempo real
            document.getElementById('vel-txt').innerText = Math.round(Math.hypot(player.vx, player.vy) * 20);

            // 2. Giro de Câmera/Mira e Disparo Automático Dinâmico
            if(joyAim.active) {
                player.angle = Math.atan2(joyAim.outY, joyAim.outX);
                let now = Date.now();
                if(now - player.lastShot > player.fireRate) {
                    fireLaser(player, player.angle, false);
                    player.lastShot = now;
                }
            }

            // 3. Gerenciamento de Lasers (Mapeamento e Colisão Vetorial)
            for(let i = lasers.length - 1; i >= 0; i--) {
                let l = lasers[i];
                l.x += l.vx; l.y += l.vy;

                if(l.x < 0 || l.x > canvas.width || l.y < 0 || l.y > canvas.height) {
                    lasers.splice(i, 1);
                    continue;
                }

                if(!l.isEnemy) {
                    // Laser do Player acertando Inimigos
                    for(let j = enemies.length - 1; j >= 0; j--) {
                        let e = enemies[j];
                        if(Math.hypot(l.x - e.x, l.y - e.y) < l.radius + e.radius) {
                            explode(e.x, e.y, e.color, 14);
                            enemies.splice(j, 1);
                            lasers.splice(i, 1);
                            kills++;
                            document.getElementById('kills-txt').innerText = kills;
                            break;
                        }
                    }
                } else {
                    // Laser Inimigo acertando Player
                    if(Math.hypot(l.x - player.x, l.y - player.y) < l.radius + player.radius) {
                        explode(player.x, player.y, '#00ffcc', 8);
                        player.shield -= 15;
                        document.getElementById('shield-txt').innerText = Math.max(0, player.shield);
                        lasers.splice(i, 1);

                        if(player.shield <= 0) {
                            explode(player.x, player.y, '#ffffff', 30);
                            running = false;
                            document.getElementById('final-kills').innerText = kills;
                            document.getElementById('gameover-modal').classList.add('active');
                        }
                    }
                }
            }

            // 4. Inteligência Artificial dos Inimigos (Aproximação Suave com Física)
            let now = Date.now();
            for(let e of enemies) {
                let angToPlayer = Math.atan2(player.y - e.y, player.x - e.x);
                
                // Física de empuxo simulada para os bots
                e.vx += Math.cos(angToPlayer) * 0.05;
                e.vy += Math.sin(angToPlayer) * 0.05;
                e.vx *= 0.97; e.vy *= 0.97;
                e.x += e.vx; e.y += e.vy;

                // IA decide atirar baseado em proximidade estruturada
                if(Math.hypot(player.x - e.x, player.y - e.y) < 280 && now - e.lastShot > e.fireInterval) {
                    fireLaser(e, angToPlayer, true);
                    e.lastShot = now;
                }
            }

            // 5. Partículas Físicas
            for(let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy;
                p.life -= p.decay;
                if(p.life <= 0) particles.splice(i, 1);
            }

            // Controle de Spawns Gradativos
            if(now - lastSpawn > 2000) {
                spawnEnemy();
                lastSpawn = now;
            }
        }

        // RENDERIZAÇÃO ESTILIZADA (Desenho Gráfico)
        function draw() {
            ctx.fillStyle = '#020205';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Desenhar Estrelas (Fundo Animado)
            ctx.fillStyle = '#ffffff';
            for(let s of stars) {
                ctx.fillRect(s.x, s.y, s.size, s.size);
                if(running) {
                    // Move as estrelas no sentido oposto da nave para efeito de velocidade real
                    s.y += s.speed + (player.vy * -0.1);
                    s.x += (player.vx * -0.1);
                    if(s.y > canvas.height) s.y = 0;
                    if(s.x > canvas.width) s.x = 0;
                    if(s.x < 0) s.x = canvas.width;
                }
            }

            // Desenhar Partículas
            for(let p of particles) {
                ctx.save();
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2);
                ctx.fill();
                ctx.restore();
            }

            // Desenhar Lasers Cósmicos
            for(let l of lasers) {
                ctx.save();
                ctx.shadowBlur = 8;
                ctx.shadowColor = l.color;
                ctx.fillStyle = l.color;
                ctx.beginPath();
                ctx.arc(l.x, l.y, l.radius, 0, Math.PI*2);
                ctx.fill();
                ctx.restore();
            }

            // Desenhar Naves Inimigas (Design de Triângulo Invertido Vermelho)
            for(let e of enemies) {
                ctx.save();
                ctx.translate(e.x, e.y);
                ctx.rotate(Math.atan2(player.y - e.y, player.x - e.x));
                ctx.fillStyle = e.color;
                ctx.beginPath();
                ctx.moveTo(12, 0);
                ctx.lineTo(-10, -10);
                ctx.lineTo(-6, 0);
                ctx.lineTo(-10, 10);
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }

            // Desenhar Nave do Jogador (Design Premium Geométrico Neon)
            if(running) {
                ctx.save();
                ctx.translate(player.x, player.y);
                ctx.rotate(player.angle);
                
                // Brilho do reator traseiro
                if(joyMove.active) {
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = '#ffaa00';
                    ctx.fillStyle = '#ff5500';
                    ctx.fillRect(-18, -4, 8, 8);
                }

                ctx.shadowBlur = 12;
                ctx.shadowColor = '#00ffcc';
                ctx.fillStyle = '#00ffcc';

                // Corpo da Nave Espacial
                ctx.beginPath();
                ctx.moveTo(16, 0); // Bico apontado para a frente da rotação
                ctx.lineTo(-12, -12);
                ctx.lineTo(-6, 0);
                ctx.lineTo(-12, 12);
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }

            // DESENHAR JOYSTICKS DIRETOS NO CANVAS (Evita quebras de layout do WebView)
            drawJoystick(joyMove, '#00ffcc');
            drawJoystick(joyAim, '#ff3366');
        }

        function drawJoystick(joy, color) {
            if(!joy.active && joy.x === 0) return; // Aguarda resize inicial
            ctx.save();
            ctx.globalAlpha = joy.active ? 0.4 : 0.15;
            
            // Base externa do analógico
            ctx.strokeStyle = color;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(joy.x, joy.y, joy.radOuter, 0, Math.PI*2);
            ctx.stroke();

            // Centro arrastável do analógico
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(joy.currX, joy.currY, joy.radInner, 0, Math.PI*2);
            ctx.fill();
            ctx.restore();
        }

        // Loop de Atualização de Quadros Constante
        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        function restartGame() {
            player.shield = 100;
            player.x = canvas.width / 2;
            player.y = canvas.height / 2;
            player.vx = 0; player.vy = 0;
            kills = 0;
            enemies.length = 0;
            lasers.length = 0;
            document.getElementById('shield-txt').innerText = 100;
            document.getElementById('kills-txt').innerText = 0;
            document.getElementById('gameover-modal').classList.remove('active');
            running = true;
        }

        // Inicialização
        loop();
    </script>
</body>
</html>

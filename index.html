<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bloxd.io BedWars Remake</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
            touch-action: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #5c94fc; /* Cor do céu clássica */
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        /* Top HUD de Recursos */
        #resource-hud {
            position: absolute;
            top: 10px;
            left: 10px;
            display: flex;
            gap: 10px;
            pointer-events: none;
        }
        .res-count {
            background: rgba(0,0,0,0.6);
            border-radius: 4px;
            padding: 6px 12px;
            color: #fff;
            font-weight: bold;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid #444;
        }
        
        /* Botões de Ação Lateral */
        .side-btn {
            position: absolute;
            right: 15px;
            background: #4a5f7d;
            border: 2px solid #fff;
            color: white;
            padding: 10px 16px;
            font-weight: bold;
            border-radius: 6px;
            font-size: 13px;
            box-shadow: 0 4px 0 #2c3a4e;
        }
        #shop-trigger { top: 15px; background: #de9b35; }
        #break-trigger { top: 70px; background: #cc3333; }

        /* Hotbar Estilo Bloxd.io */
        #hotbar {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            background: rgba(30, 30, 40, 0.85);
            padding: 4px;
            border-radius: 5px;
            border: 2px solid #555;
            gap: 4px;
        }
        .slot {
            width: 44px;
            height: 44px;
            background: #3a3a4a;
            border: 2px solid #777;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 10px;
            font-weight: bold;
        }
        .slot.active {
            border-color: #fff;
            background: #555577;
        }
        .slot span { font-size: 9px; color: #aaa; }

        /* UI do Shop inspirado no seu Print */
        #shop-modal {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 20, 30, 0.95);
            z-index: 100;
            display: none;
            grid-template-columns: 120px 1fr;
        }
        #shop-sidebar {
            background: #1c2331;
            border-right: 2px solid #2d384e;
            display: flex;
            flex-direction: column;
            padding: 10px 0;
        }
        .tab-btn {
            background: transparent; border: none; color: #a0aabf;
            padding: 14px; text-align: left; font-weight: bold; font-size: 14px;
        }
        .tab-btn.active { color: #de9b35; background: #253047; border-left: 4px solid #de9b35; }
        
        #shop-content {
            padding: 15px;
            overflow-y: auto;
        }
        .shop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
        }
        .item-card {
            background: #253047;
            border: 1px solid #3b4b6e;
            border-radius: 6px;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #fff;
        }
        .item-card button {
            background: #de9b35; color: black; border: none;
            padding: 6px 10px; font-weight: bold; border-radius: 4px; font-size: 12px;
        }
        .item-card button:disabled { background: #444; color: #888; }

        /* Alerta de Cama Quebrada */
        #alert-box {
            position: absolute;
            top: 120px; width: 100%;
            text-align: center;
            font-size: 20px; font-weight: bold; color: #ff3333;
            text-shadow: 0 2px 4px #000;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="resource-hud">
        <div class="res-count">⬜ FERRO: <span id="hud-iron">0</span></div>
        <div class="res-count" style="color:#ffd700">🟨 OURO: <span id="hud-gold">0</span></div>
    </div>

    <button id="shop-trigger" class="side-btn" onclick="toggleShop(true)">LOJA [B]</button>
    <button id="break-trigger" class="side-btn" onclick="triggerAttack()">ATACAR / QUEBRAR</button>

    <div id="alert-box"></div>

    <div id="hotbar">
        <div class="slot active" onclick="setSlot(0)">⚔️<br><span>Espada</span></div>
        <div class="slot" onclick="setSlot(1)">⛏️<br><span>Picareta</span></div>
        <div class="slot" onclick="setSlot(2)" id="slot-blocks">📦0<br><span>Blocos</span></div>
    </div>

    <canvas id="bwCanvas"></canvas>

    <div id="shop-modal">
        <div id="shop-sidebar">
            <button class="tab-btn active" onclick="switchTab('blocks')">Blocks</button>
            <button class="tab-btn" onclick="switchTab('combat')">Combat</button>
            <button class="tab-btn" onclick="switchTab('utility')">Utility</button>
            <button class="tab-btn" style="margin-top:auto; background:#cc3333; color:white;" onclick="toggleShop(false)">Sair</button>
        </div>
        <div id="shop-content">
            <h2 style="color:white; margin-bottom:15px;" id="shop-title">Blocks Shop</h2>
            <div class="shop-grid" id="shop-items-container"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('bwCanvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Dados de Economia do Jogador
        let inventory = { iron: 0, gold: 0, blocks: 0 };
        let activeSlot = 0; // 0=Espada, 1=Picareta, 2=Blocos
        let currentTab = 'blocks';

        // Configuração de Itens da Loja
        const shopData = {
            blocks: [
                { id: 'wool', name: 'Lã x16', costType: 'iron', cost: 8, amount: 16 },
                { id: 'wood', name: 'Madeira x16', costType: 'iron', cost: 16, amount: 16 }
            ],
            combat: [
                { id: 'stone_sword', name: 'Espada Pedra', costType: 'iron', cost: 24, weapon: true, dmg: 25 },
                { id: 'iron_armor', name: 'Armadura Ferro', costType: 'gold', cost: 12, armor: true }
            ],
            utility: [
                { id: 'stone_pick', name: 'Picareta Pedra', costType: 'iron', cost: 24, tool: true },
                { id: 'apple', name: 'Maçã (Cura)', costType: 'iron', cost: 6, heal: true }
            ]
        };

        // Estado das Camas do jogo
        let blueBedAlive = true;
        let redBedAlive = true;

        // FÍSICA E ENTIDADES
        const player = {
            x: 100, y: 150, radius: 12, speed: 3, angle: 0,
            hp: 100, maxHp: 100, team: 'blue', dmg: 15
        };

        const bot = {
            x: 500, y: 150, radius: 12, speed: 1.8, angle: 0,
            hp: 100, team: 'red', state: 'defend', lastAttack: 0
        };

        // Estrutura do Mapa em Blocos/Ilhas (Grid de tamanho 32x32 para simular blocos)
        const blockSize = 32;
        let mapBlocks = [];

        // Criando Ilhas Iniciais (Base Azul e Base Vermelha)
        function initMap() {
            // Ilha Azul (Esquerda)
            for(let i=1; i<6; i++) {
                for(let j=3; j<8; j++) {
                    mapBlocks.push({x: i*blockSize, y: j*blockSize, type: 'island'});
                }
            }
            // Ilha Vermelha (Direita)
            for(let i=14; i<19; i++) {
                for(let j=3; j<8; j++) {
                    mapBlocks.push({x: i*blockSize, y: j*blockSize, type: 'island'});
                }
            }
        }
        initMap();

        // Camas e Geradores
        const blueBed = { x: 48, y: 160, w: 40, h: 25 };
        const redBed = { x: 560, y: 160, w: 40, h: 25 };
        const ironGenerator = { x: 96, y: 220, type: 'iron', lastSpawn: 0 };
        const redGenerator = { x: 512, y: 220, type: 'iron', lastSpawn: 0 };

        // Joysticks nativos anti-bug do Sketchware
        const joyMove = { x: 75, y: 0, rOut: 45, rIn: 18, tId: null, cx: 75, cy: 0, active: false, dx: 0, dy: 0 };
        function initJoystick() {
            joyMove.y = canvas.height - 80;
            joyMove.cx = joyMove.x; joyMove.cy = joyMove.y;
        }
        initJoystick();
        window.addEventListener('resize', initJoystick);

        // Sistema Multitouch Seguro
        window.addEventListener('touchstart', (e) => {
            for(let t of e.changedTouches) {
                if(t.clientX < canvas.width / 2 && joyMove.tId === null) {
                    joyMove.tId = t.identifier;
                    joyMove.active = true;
                    updateJoy(t.clientX, t.clientY);
                } else if(t.clientX >= canvas.width / 2) {
                    // Clicou no lado direito da tela: Ação Baseada no Slot
                    handleRightClickAction(t.clientX, t.clientY);
                }
            }
        });

        window.addEventListener('touchmove', (e) => {
            for(let t of e.touches) {
                if(t.identifier === joyMove.tId) updateJoy(t.clientX, t.clientY);
            }
        });

        window.addEventListener('touchend', (e) => {
            for(let t of e.changedTouches) {
                if(t.identifier === joyMove.tId) {
                    joyMove.tId = null; joyMove.active = false;
                    joyMove.cx = joyMove.x; joyMove.cy = joyMove.y;
                    joyMove.dx = 0; joyMove.dy = 0;
                }
            }
        });

        function updateJoy(tx, ty) {
            let dx = tx - joyMove.x;
            let dy = ty - joyMove.y;
            let dist = Math.hypot(dx, dy);
            if(dist > joyMove.rOut) {
                dx = (dx / dist) * joyMove.rOut;
                dy = (dy / dist) * joyMove.rOut;
            }
            joyMove.cx = joyMove.x + dx;
            joyMove.cy = joyMove.y + dy;
            joyMove.dx = dx / joyMove.rOut;
            joyMove.dy = dy / joyMove.rOut;
        }

        // Lógica de Construção de pontes/blocos estilo Bloxd
        function handleRightClickAction(screenX, screenY) {
            if(activeSlot === 2 && inventory.blocks > 0) {
                // Converte clique da tela para posição do grid do mapa
                let gridX = Math.floor(screenX / blockSize) * blockSize;
                let gridY = Math.floor(screenY / blockSize) * blockSize;

                // Checa se já existe bloco ali
                let exist = mapBlocks.some(b => b.x === gridX && b.y === gridY);
                if(!exist) {
                    mapBlocks.push({ x: gridX, y: gridY, type: 'bridge' });
                    inventory.blocks--;
                    updateHUD();
                }
            }
        }

        // Checar se o personagem está pisando em solo firme ou caindo no void
        function isPlayerOnPlatform(px, py) {
            return mapBlocks.some(b => 
                px >= b.x && px <= b.x + blockSize &&
                py >= b.y && py <= b.y + blockSize
            );
        }

        // Atacar ou Quebrar Cama por proximidade
        function triggerAttack() {
            // Atacar o Bot Red
            let distToBot = Math.hypot(player.x - bot.x, player.y - bot.y);
            if(distToBot < 40) {
                bot.hp -= player.dmg;
                if(bot.hp <= 0) {
                    if(redBedAlive) {
                        bot.x = 500; bot.y = 150; bot.hp = 100; // Renasce se a cama existir
                        showAlert("BOT MORREU E RENASCEU!");
                    } else {
                        bot.x = -9999; // Eliminado definitivo do round
                        showAlert("RED TIME ELIMINADO!");
                    }
                }
            }

            // Tentar quebrar a cama vermelha
            if(redBedAlive) {
                let distToBed = Math.hypot(player.x - (redBed.x + 20), player.y - (redBed.y + 12));
                if(distToBed < 50) {
                    redBedAlive = false;
                    showAlert("A CAMA VERMELHA FOI DESTRUÍDA!");
                }
            }
        }

        // Sistema de Alertas na tela
        function showAlert(msg) {
            const el = document.getElementById('alert-box');
            el.innerText = msg;
            setTimeout(() => el.innerText = "", 3000);
        }

        // ENGINE LOOP (Física e IA)
        function update() {
            let now = Date.now();

            // 1. Movimentação do Jogador
            if(joyMove.active) {
                player.x += joyMove.dx * player.speed;
                player.y += joyMove.dy * player.speed;
                player.angle = Math.atan2(joyMove.dy, joyMove.dx);
            }

            // Detecção de queda no Void (Mecânica clássica de BedWars)
            if(!isPlayerOnPlatform(player.x, player.y)) {
                player.hp -= 2; // Sofre dano contínuo no vácuo
                if(player.hp <= 0) {
                    if(blueBedAlive) {
                        player.x = 100; player.y = 150; player.hp = 100;
                        showAlert("VOCÊ CAIU NO VOID E RESPAWNOU!");
                    } else {
                        showAlert("GAME OVER! SUA CAMA JÁ TINHA SIDO QUEBRADA!");
                        player.x = -1000;
                    }
                }
            }

            // 2. Geradores acumulando minérios no chão por aproximação
            if(now - ironGenerator.lastSpawn > 1200) {
                if(Math.hypot(player.x - ironGenerator.x, player.y - ironGenerator.y) < 30) {
                    inventory.iron += 2;
                    updateHUD();
                }
                // O bot também pega ferro se passar perto
                if(Math.hypot(bot.x - redGenerator.x, bot.y - redGenerator.y) < 30) {
                    // Lógica interna do bot
                }
                ironGenerator.lastSpawn = now;
            }

            // 3. Inteligência Artificial do Bot Inimigo
            if(bot.x > 0) {
                let distToPlayer = Math.hypot(player.x - bot.x, player.y - bot.y);
                
                // Se o player construir ponte e chegar perto, o bot entra em modo de ataque furioso
                if(distToPlayer < 180) {
                    bot.angle = Math.atan2(player.y - bot.y, player.x - bot.x);
                    bot.x += Math.cos(bot.angle) * bot.speed;
                    bot.y += Math.sin(bot.angle) * bot.speed;

                    if(distToPlayer < 30 && now - bot.lastAttack > 1000) {
                        player.hp -= 15;
                        showAlert("O BOT TE ATALHOU!");
                        bot.lastAttack = now;
                    }
                }
            }
        }

        // PARTE GRÁFICA (Visual Render 2D Top-Down Simulado)
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Desenhar o Vazio (Void de Fundo Espacial)
            ctx.fillStyle = "#4a83ec";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Desenhar Blocos das Ilhas/Pontes
            for(let b of mapBlocks) {
                ctx.fillStyle = b.type === 'island' ? '#8bc34a' : '#e0e0e0'; // Verde para ilha, cinza para ponte
                ctx.fillRect(b.x, b.y, blockSize, blockSize);
                ctx.strokeStyle = 'rgba(0,0,0,0.15)';
                ctx.strokeRect(b.x, b.y, blockSize, blockSize);
            }

            // Desenhar Geradores de Recurso
            ctx.fillStyle = "#757575";
            ctx.beginPath(); ctx.arc(ironGenerator.x, ironGenerator.y, 8, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#757575";
            ctx.beginPath(); ctx.arc(redGenerator.x, redGenerator.y, 8, 0, Math.PI*2); ctx.fill();

            // Desenhar Cama Azul
            if(blueBedAlive) {
                ctx.fillStyle = "#2196f3"; ctx.fillRect(blueBed.x, blueBed.y, blueBed.w, blueBed.h);
                ctx.fillStyle = "#fff"; ctx.fillRect(blueBed.x, blueBed.y, 12, blueBed.h); // Almofada
            }

            // Desenhar Cama Vermelha
            if(redBedAlive) {
                ctx.fillStyle = "#f44336"; ctx.fillRect(redBed.x, redBed.y, redBed.w, redBed.h);
                ctx.fillStyle = "#fff"; ctx.fillRect(redBed.x + 28, redBed.y, 12, redBed.h); // Almofada
            }

            // Desenhar Bot Inimigo (Red)
            if(bot.x > 0) {
                ctx.fillStyle = "#ff3333";
                ctx.beginPath(); ctx.arc(bot.x, bot.y, bot.radius, 0, Math.PI*2); ctx.fill();
                ctx.strokeStyle = "#000"; ctx.stroke();
            }

            // Desenhar Personagem Jogador (Blue)
            if(player.x > 0) {
                ctx.save();
                ctx.translate(player.x, player.y);
                ctx.rotate(player.angle);
                ctx.fillStyle = "#3355ff";
                ctx.beginPath(); ctx.arc(0, 0, player.radius, 0, Math.PI*2); ctx.fill();
                ctx.strokeStyle = "#fff"; ctx.lineWidth = 1.5; ctx.stroke();
                
                // Mostrar item na mão baseado na Hotbar
                ctx.fillStyle = activeSlot === 0 ? '#777' : (activeSlot === 1 ? '#555' : '#e0e0e0');
                ctx.fillRect(8, -3, 10, 5);
                ctx.restore();

                // Barra de HP flutuante em cima do player
                ctx.fillStyle = 'red'; ctx.fillRect(player.x - 15, player.y - 22, 30, 4);
                ctx.fillStyle = 'green'; ctx.fillRect(player.x - 15, player.y - 22, 30 * (player.hp/player.maxHp), 4);
            }

            // Renderizar Analógico Virtual na tela
            if(joyMove.active) {
                ctx.save(); ctx.globalAlpha = 0.4;
                ctx.strokeStyle = "#fff"; ctx.lineWidth = 3;
                ctx.beginPath(); ctx.arc(joyMove.x, joyMove.y, joyMove.rOut, 0, Math.PI*2); ctx.stroke();
                ctx.fillStyle = "#fff";
                ctx.beginPath(); ctx.arc(joyMove.cx, joyMove.cy, joyMove.rIn, 0, Math.PI*2); ctx.fill();
                ctx.restore();
            }
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        // GERENCIADOR DE INTERFACE DO USUÁRIO (UI)
        function updateHUD() {
            document.getElementById('hud-iron').innerText = inventory.iron;
            document.getElementById('hud-gold').innerText = inventory.gold;
            document.getElementById('slot-blocks').innerHTML = `📦${inventory.blocks}<br><span>Blocos</span>`;
        }

        function setSlot(id) {
            activeSlot = id;
            const slots = document.querySelectorAll('.slot');
            slots.forEach((s, idx) => s.className = idx === id ? 'slot active' : 'slot');
        }

        function toggleShop(open) {
            document.getElementById('shop-modal').style.display = open ? 'grid' : 'none';
            if(open) renderShopList();
        }

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('shop-title').innerText = `${tab.toUpperCase()} SHOP`;
            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(b => b.className = b.innerText.toLowerCase() === tab ? 'tab-btn active' : 'tab-btn');
            renderShopList();
        }

        function renderShopList() {
            const container = document.getElementById('shop-items-container');
            container.innerHTML = '';
            
            shopData[currentTab].forEach(item => {
                let card = document.createElement('div');
                card.className = 'item-card';
                let currentCurrency = inventory[item.costType];
                let disabled = currentCurrency < item.cost ? 'disabled' : '';

                card.innerHTML = `
                    <div>
                        <strong>${item.name}</strong><br>
                        <span style="font-size:11px; color:#aaa;">Custo: ${item.cost} ${item.costType}</span>
                    </div>
                    <button ${disabled} onclick="buyItem('${item.id}', ${item.cost}, '${item.costType}', ${item.amount || 0})">Comprar</button>
                `;
                container.appendChild(card);
            });
        }

        function buyItem(id, cost, type, amt) {
            if(inventory[type] >= cost) {
                inventory[type] -= cost;
                if(id === 'wool' || id === 'wood') {
                    inventory.blocks += amt;
                    setSlot(2); // Seleciona automaticamente o bloco comprado
                } else if(id === 'stone_sword') {
                    player.dmg = 25;
                    showAlert("ESPA DE PEDRA ADQUIRIDA!");
                } else if(id === 'apple') {
                    player.hp = Math.min(player.maxHp, player.hp + 30);
                }
                updateHUD();
                renderShopList();
            }
        }

        // Inicializador oficial
        updateHUD();
        loop();
    </script>
</body>
</html>

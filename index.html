<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vortex Strike: CS2 Edition</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
            touch-action: none; /* Bloqueia travas na WebView do Android */
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #11141a;
            font-family: Arial, sans-serif;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        /* HUD Superior Estilo CS2 */
        #hud {
            position: absolute;
            top: 10px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 15px;
            pointer-events: none;
        }
        .hud-card {
            background: rgba(18, 22, 29, 0.9);
            border: 2px solid #2e3748;
            padding: 6px 12px;
            border-radius: 4px;
            color: #fff;
            font-size: 13px;
            font-weight: bold;
            text-align: center;
        }
        .hud-card span { color: #de9b35; font-size: 15px; } /* Cor clássica do CS */
        
        #buy-btn {
            position: absolute;
            top: 65px;
            left: 15px;
            background: #de9b35;
            color: #000;
            border: none;
            padding: 6px 14px;
            font-weight: bold;
            font-size: 12px;
            border-radius: 3px;
        }

        /* Modais */
        .modal {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 12, 16, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 10;
            display: none;
        }
        .modal.active { display: flex; }
        .modal h2 { color: #de9b35; margin-bottom: 20px; letter-spacing: 1px; }

        .shop-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 80%;
            max-width: 320px;
            margin-bottom: 20px;
        }
        .shop-item {
            display: flex;
            justify-content: space-between;
            background: #1c222e;
            padding: 12px;
            border: 1px solid #3b475c;
            border-radius: 4px;
            align-items: center;
        }
        .shop-item button {
            background: #de9b35; color: #000; border: none;
            padding: 6px 12px; font-weight: bold; border-radius: 2px;
        }
        .shop-item button:disabled { background: #444; color: #888; }
    </style>
</head>
<body>

    <div id="hud">
        <div class="hud-card">HP<br><span id="hp-txt">100</span></div>
        <div class="hud-card">ARMA<br><span id="weapon-txt">Deagle</span></div>
        <div class="hud-card">MONEY<br><span id="money-txt">$800</span></div>
        <div class="hud-card">KILLS<br><span id="kills-txt">0</span></div>
    </div>

    <button id="buy-btn" onclick="openShop()">[B] COMPRAR</button>

    <canvas id="csCanvas"></canvas>

    <!-- Menu de Compras -->
    <div id="shop-modal" class="modal">
        <h2>MENU DE COMPRAS</h2>
        <div class="shop-list" id="shop-list"></div>
        <button onclick="closeShop()" style="background:#333; border:none; color:#fff; padding:10px 20px; border-radius:3px; font-weight:bold;">FECHAR</button>
    </div>

    <!-- Tela de Fim de Jogo -->
    <div id="gameover-modal" class="modal">
        <h2 id="go-title">FIM DA RODADA</h2>
        <p style="color:#aaa; margin-bottom:20px;">Você eliminou <span id="final-kills" style="color:#de9b35">0</span> alvos.</p>
        <button onclick="restartRound()" style="background:#de9b35; color:#000; border:none; padding:12px 30px; font-weight:bold; border-radius:3px;">PRÓXIMO ROUND</button>
    </div>

    <script>
        const canvas = document.getElementById('csCanvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Configurações do Jogo
        let gameRunning = true;
        let kills = 0;
        let money = 800;
        let lastBotSpawn = 0;

        // Arsenal Estilo CS2 (Dano, Recoil/Spray, Cadência, Preço)
        const arsenal = {
            deagle: { name: "Desert Eagle", damage: 55, sprayMax: 2, fireRate: 500, price: 0, color: "#a0a5b0", barrelLen: 22 },
            ak47: { name: "AK-47", damage: 36, sprayMax: 12, fireRate: 110, price: 2700, color: "#85582a", barrelLen: 26 },
            awp: { name: "AWP Magnun", damage: 110, sprayMax: 25, fireRate: 1300, price: 4750, color: "#3a4f3b", barrelLen: 32 }
        };

        // Jogador (CT)
        const player = {
            x: 100,
            y: 100,
            radius: 15,
            speed: 2.8,
            angle: 0,
            hp: 100,
            currentWeapon: 'deagle',
            lastShot: 0,
            sprayCount: 0,  // Mecânica de controle do spray do CS2
            lastShotTime: 0
        };

        // Entidades
        const bots = [];
        const bullets = [];
        const particles = [];

        // Obstáculos / Paredes Táticas do Mapa
        const walls = [
            { x: 0, y: 0, w: 30, h: 2000 }, // Borda Esquerda
            { x: 0, y: 0, w: 2000, h: 30 }, // Borda Superior
            { x: 350, y: 0, w: 50, h: 250 }, // Caixa Grande Meio
            { x: 150, y: 350, w: 200, h: 60 }, // Parede B1
            { x: 500, y: 300, w: 80, h: 80 }   // Caixa Bomb B
        ];

        // Ajustar dinamicamente as paredes externas com base no tamanho da tela
        function updateOuterWalls() {
            walls[0].h = canvas.height;
            walls[1].w = canvas.width;
        }
        updateOuterWalls();
        window.addEventListener('resize', updateOuterWalls);

        // Joysticks Virtuais Integrados Direto no Canvas (Fix de toque absoluto do Sketchware)
        const joyMove = { x: 80, y: 0, rOut: 45, rIn: 20, tId: null, cx: 80, cy: 0, active: false, dx: 0, dy: 0 };
        const joyAim = { x: 0, y: 0, rOut: 45, rIn: 20, tId: null, cx: 0, cy: 0, active: false, dx: 0, dy: 0 };

        function initJoysticks() {
            joyMove.y = canvas.height - 85;
            joyAim.x = canvas.width - 80;
            joyAim.y = canvas.height - 85;
            joyMove.cx = joyMove.x; joyMove.cy = joyMove.y;
            joyAim.cx = joyAim.x; joyAim.cy = joyAim.y;
        }
        initJoysticks();
        window.addEventListener('resize', initJoysticks);

        // Processador Touch robusto contra travas
        window.addEventListener('touchstart', (e) => {
            for(let t of e.changedTouches) {
                if(t.clientX < canvas.width / 2 && joyMove.tId === null) {
                    joyMove.tId = t.identifier;
                    joyMove.active = true;
                    updateJoy(joyMove, t.clientX, t.clientY);
                }
                if(t.clientX >= canvas.width / 2 && joyAim.tId === null) {
                    joyAim.tId = t.identifier;
                    joyAim.active = true;
                    updateJoy(joyAim, t.clientX, t.clientY);
                }
            }
        }, { passive: false });

        window.addEventListener('touchmove', (e) => {
            e.preventDefault();
            for(let t of e.touches) {
                if(t.identifier === joyMove.tId) updateJoy(joyMove, t.clientX, t.clientY);
                if(t.identifier === joyAim.tId) updateJoy(joyAim, t.clientX, t.clientY);
            }
        }, { passive: false });

        const endTouch = (e) => {
            for(let t of e.changedTouches) {
                if(t.identifier === joyMove.tId) {
                    joyMove.tId = null; joyMove.active = false;
                    joyMove.cx = joyMove.x; joyMove.cy = joyMove.y;
                    joyMove.dx = 0; joyMove.dy = 0;
                }
                if(t.identifier === joyAim.tId) {
                    joyAim.tId = null; joyAim.active = false;
                    joyAim.cx = joyAim.x; joyAim.cy = joyAim.y;
                    joyAim.dx = 0; joyAim.dy = 0;
                }
            }
        };
        window.addEventListener('touchend', endTouch);
        window.addEventListener('touchcancel', endTouch);

        function updateJoy(j, tx, ty) {
            let distanceX = tx - j.x;
            let distanceY = ty - j.y;
            let currentDist = Math.hypot(distanceX, distanceY);

            if(currentDist > j.rOut) {
                distanceX = (distanceX / currentDist) * j.rOut;
                distanceY = (distanceY / currentDist) * j.rOut;
                currentDist = j.rOut;
            }
            j.cx = j.x + distanceX;
            j.cy = j.y + distanceY;
            j.dx = distanceX / j.rOut;
            j.dy = distanceY / j.rOut;
        }

        // Sistema de Sangue (Partículas)
        function spawnBlood(x, y, amount = 8) {
            for(let i=0; i<amount; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 4,
                    vy: (Math.random() - 0.5) * 4,
                    r: Math.random() * 2.5 + 1,
                    color: '#990000',
                    alpha: 1,
                    decay: Math.random() * 0.05 + 0.02
                });
            }
        }

        // Lógica de Detecção Mecânica de Colisão com Paredes/Obstáculos
        function checkWallCollision(entity, nextX, nextY) {
            for(let w of walls) {
                if (nextX + entity.radius > w.x && nextX - entity.radius < w.x + w.w &&
                    nextY + entity.radius > w.y && nextY - entity.radius < w.y + w.h) {
                    return true; // Colidiu, impede o passo de movimento
                }
            }
            return false;
        }

        // Disparar com Mecânica de Spray / Coice do CS2
        function shootBullet(shooter, isBot = false) {
            const now = Date.now();
            const wpn = arsenal[player.currentWeapon];
            
            if (!isBot && now - player.lastShot < wpn.fireRate) return;
            if (!isBot) player.lastShot = now;

            // Gerenciar Spray (Aumenta o erro de precisão conforme atira seguido)
            let sprayError = 0;
            if(!isBot) {
                if(now - player.lastShotTime < wpn.fireRate + 150) {
                    player.sprayCount = Math.min(wpn.sprayMax, player.sprayCount + 1);
                } else {
                    player.sprayCount = 0; // Descansou o spray
                }
                player.lastShotTime = now;
                sprayError = (Math.random() - 0.5) * (player.sprayCount * 0.035);
            }

            const finalAngle = shooter.angle + sprayError;

            bullets.push({
                x: shooter.x + Math.cos(shooter.angle) * wpn.barrelLen,
                y: shooter.y + Math.sin(shooter.angle) * wpn.barrelLen,
                vx: Math.cos(finalAngle) * 14,
                vy: Math.sin(finalAngle) * 14,
                damage: isBot ? 15 : wpn.damage,
                isBot: isBot
            });

            // Pequena fagulha do disparo
            spawnBlood(shooter.x + Math.cos(shooter.angle)*wpn.barrelLen, shooter.y + Math.sin(shooter.angle)*wpn.barrelLen, 3);
        }

        // Inteligência Artificial dos Inimigos (Terroristas)
        function spawnBot() {
            if(bots.length >= 5 || !gameRunning) return;
            
            // Nasce do lado direito da tela (Base T)
            let bx = canvas.width - 60 - (Math.random() * 100);
            let by = 100 + (Math.random() * (canvas.height - 200));

            bots.push({
                x: bx, y: by,
                radius: 15,
                speed: 1.5,
                angle: 0,
                hp: 100,
                lastShot: 0,
                fireRate: 800 + Math.random() * 600
            });
        }

        // Atualização e Lógica Geral
        function update() {
            if(!gameRunning) return;

            const now = Date.now();

            // 1. Movimento do Jogador com bloqueio físico de parede
            if(joyMove.active) {
                let nextX = player.x + joyMove.dx * player.speed;
                let nextY = player.y + joyMove.dy * player.speed;

                if(!checkWallCollision(player, nextX, player.y)) player.x = nextX;
                if(!checkWallCollision(player, player.x, nextY)) player.y = nextY;

                if(!joyAim.active) player.angle = Math.atan2(joyMove.dy, joyMove.dx);
            } else {
                // Recuperação natural de spray parado
                if(now - player.lastShotTime > 300) player.sprayCount = Math.max(0, player.sprayCount - 0.5);
            }

            // Limite de bordas da janela padrão
            player.x = Math.max(player.radius, Math.min(canvas.width - player.radius, player.x));
            player.y = Math.max(player.radius, Math.min(canvas.height - player.radius, player.y));

            // 2. Mirar e Abrir Fogo (Segurar o Dedo faz Spray)
            if(joyAim.active) {
                player.angle = Math.atan2(joyAim.dy, joyAim.dx);
                shootBullet(player, false);
            }

            // 3. Processar Balas e Colisões
            for(let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];
                b.x += b.vx; b.y += b.vy;

                // Sumir se sair da tela ou bater na parede
                if(b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height || checkWallCollision({radius: 2}, b.x, b.y)) {
                    bullets.splice(i, 1);
                    continue;
                }

                if(!b.isBot) {
                    // Bala do jogador nos Terroristas (Bots)
                    for(let j = bots.length - 1; j >= 0; j--) {
                        let bot = bots[j];
                        if(Math.hypot(b.x - bot.x, b.y - bot.y) < bot.radius + 3) {
                            bot.hp -= b.damage;
                            spawnBlood(b.x, b.y, 6);
                            bullets.splice(i, 1);

                            if(bot.hp <= 0) {
                                spawnBlood(bot.x, bot.y, 16);
                                bots.splice(j, 1);
                                kills++;
                                money += 300; // Recompensa de eliminação padrão do CS
                                updateHUD();
                            }
                            break;
                        }
                    }
                } else {
                    // Bala do Bot no Jogador (CT)
                    if(Math.hypot(b.x - player.x, b.y - player.y) < player.radius + 3) {
                        player.hp -= b.damage;
                        spawnBlood(b.x, b.y, 8);
                        bullets.splice(i, 1);
                        updateHUD();

                        if(player.hp <= 0) {
                            gameRunning = false;
                            document.getElementById('go-title').innerText = "TERRORISTAS VENCERAM";
                            document.getElementById('final-kills').innerText = kills;
                            document.getElementById('gameover-modal').classList.add('active');
                        }
                    }
                }
            }

            // 4. Lógica de Inteligência Artificial dos Terroristas (Bots)
            for(let bot of bots) {
                let distToPlayer = Math.hypot(player.x - bot.x, player.y - bot.y);
                bot.angle = Math.atan2(player.y - bot.y, player.x - bot.x);

                // Se o bot perder o jogador de vista a longa distância, ele tenta se aproximar vagarosamente
                if(distToPlayer > 260) {
                    let nX = bot.x + Math.cos(bot.angle) * bot.speed;
                    let nY = bot.y + Math.sin(bot.angle) * bot.speed;
                    if(!checkWallCollision(bot, nX, bot.y)) bot.x = nX;
                    if(!checkWallCollision(bot, bot.x, nY)) bot.y = nY;
                } else {
                    // Se estiver no campo de visão tática, firma a mira e dispara
                    if(now - bot.lastShot > bot.fireRate) {
                        shootBullet(bot, true);
                        bot.lastShot = now;
                    }
                }
            }

            // 5. Partículas de Efeito
            for(let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy; p.alpha -= p.decay;
                if(p.alpha <= 0) particles.splice(i, 1);
            }

            // Spawns Contínuos de Bots para manter a ação
            if(now - lastBotSpawn > 3500) {
                spawnBot();
                lastBotSpawn = now;
            }
        }

        // Renderização Visual Geral
        function draw() {
            // Fundo Cor do Mapa (Estilo Dust 2 de cima)
            ctx.fillStyle = '#262d3a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Desenhar Paredes / Caixas Obstáculos
            ctx.fillStyle = '#414d61';
            ctx.strokeStyle = '#52627a';
            ctx.lineWidth = 2;
            for(let w of walls) {
                ctx.fillRect(w.x, w.y, w.w, w.h);
                ctx.strokeRect(w.x, w.y, w.w, w.h);
            }

            // Desenhar Partículas (Sangue)
            for(let p of particles) {
                ctx.save();
                ctx.globalAlpha = p.alpha;
                ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
                ctx.restore();
            }

            // Desenhar Projéteis de Bala
            ctx.fillStyle = '#ffff55';
            for(let b of bullets) {
                ctx.fillRect(b.x, b.y, 3, 3);
            }

            // Desenhar Terroristas (Inimigos de Roupa Vermelha/Marrom)
            for(let bot of bots) {
                ctx.save();
                ctx.translate(bot.x, bot.y);
                ctx.rotate(bot.angle);
                
                // Mãos/Arma do Bot
                ctx.fillStyle = '#555';
                ctx.fillRect(8, -3, 12, 6);

                // Corpo do Bot
                ctx.fillStyle = '#cc3333';
                ctx.beginPath(); ctx.arc(0, 0, bot.radius, 0, Math.PI*2); ctx.fill();
                ctx.strokeStyle = '#000'; ctx.lineWidth = 1.5; ctx.stroke();
                
                // Faixa na cabeça dos Terroristas
                ctx.fillStyle = '#e69138';
                ctx.fillRect(-4, -5, 5, 10);
                ctx.restore();
            }

            // Desenhar Jogador Principal (Contra-Terrorista - Azul de Elite)
            if(gameRunning) {
                ctx.save();
                ctx.translate(player.x, player.y);
                ctx.rotate(player.angle);

                // Linha de Spray Dinâmica (Feedback visual para você saber quando o tiro vai espalhar)
                if(player.sprayCount > 1) {
                    ctx.strokeStyle = 'rgba(255, 0, 0, 0.25)';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(30, -player.sprayCount * 1.5);
                    ctx.lineTo(120, -player.sprayCount * 5);
                    ctx.moveTo(30, player.sprayCount * 1.5);
                    ctx.lineTo(120, player.sprayCount * 5);
                    ctx.stroke();
                }

                // Desenhar Arma Equipada Dinâmica
                const activeWeapon = arsenal[player.currentWeapon];
                ctx.fillStyle = activeWeapon.color;
                ctx.fillRect(10, -3, activeWeapon.barrelLen, 6);

                // Corpo do CT
                ctx.fillStyle = '#3366cc';
                ctx.beginPath(); ctx.arc(0, 0, player.radius, 0, Math.PI*2); ctx.fill();
                ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1.5; ctx.stroke();

                // Capacete Militar do CT
                ctx.fillStyle = '#1c3d7d';
                ctx.beginPath(); ctx.arc(2, 0, 9, 0, Math.PI*2); ctx.fill();
                ctx.restore();
            }

            // Joysticks Virtuais Táticos
            drawJoystick(joyMove, '#de9b35');
            drawJoystick(joyAim, '#ffffff');
        }

        function drawJoystick(j, color) {
            if(!j.active && j.x === 0) return;
            ctx.save();
            ctx.globalAlpha = j.active ? 0.35 : 0.12;
            ctx.strokeStyle = color;
            ctx.lineWidth = 2.5;
            ctx.beginPath(); ctx.arc(j.x, j.y, j.rOut, 0, Math.PI*2); ctx.stroke();
            ctx.fillStyle = color;
            ctx.beginPath(); ctx.arc(j.cx, j.cy, j.rIn, 0, Math.PI*2); ctx.fill();
            ctx.restore();
        }

        function updateHUD() {
            document.getElementById('hp-txt').innerText = Math.max(0, player.hp);
            document.getElementById('money-txt').innerText = `$${money}`;
            document.getElementById('kills-txt').innerText = kills;
            document.getElementById('weapon-txt').innerText = arsenal[player.currentWeapon].name;
        }

        // Funções da Loja [B]
        function openShop() {
            gameRunning = false;
            const container = document.getElementById('shop-list');
            container.innerHTML = '';

            for(let key in arsenal) {
                let item = arsenal[key];
                let box = document.createElement('div');
                box.className = 'shop-item';
                
                let isEquipped = player.currentWeapon === key;
                let canBuy = money >= item.price || item.price === 0;

                box.innerHTML = `
                    <div>
                        <strong style="font-size:14px; color:#fff">${item.name}</strong><br>
                        <span style="color:#aaa; font-size:11px;">$${item.price} | Dano: ${item.damage}</span>
                    </div>
                    <button ${(!canBuy && !isEquipped) ? 'disabled' : ''} onclick="buyWeapon('${key}')">
                        ${isEquipped ? 'EQUIPADA' : (item.price === 0 ? 'EQUIPAR' : 'COMPRAR')}
                    </button>
                `;
                container.appendChild(box);
            }
            document.getElementById('shop-modal').classList.add('active');
        }

        function buyWeapon(key) {
            let item = arsenal[key];
            if(player.currentWeapon !== key) {
                if(money >= item.price) {
                    if(item.price > 0) money -= item.price;
                    player.currentWeapon = key;
                }
            }
            closeShop();
        }

        function closeShop() {
            document.getElementById('shop-modal').classList.remove('active');
            updateHUD();
            gameRunning = true;
        }

        function restartRound() {
            player.hp = 100;
            player.x = 100;
            player.y = 100;
            bots.length = 0;
            bullets.length = 0;
            particles.length = 0;
            updateHUD();
            document.getElementById('gameover-modal').classList.remove('active');
            gameRunning = true;
        }

        // Game Loop Principal
        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        // Inicializador de partida
        updateHUD();
        loop();
    </script>
</body>
</html>
